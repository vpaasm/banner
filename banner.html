<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Bets Feed</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: transparent;
        color: #fff;
        overflow: hidden;
      }

      .feed {
        background: #11142a;
        border: 1px solid rgba(230, 212, 160, 0.2);
        border-radius: 12px;
        overflow: hidden;
        width: 100%;
        max-width: 500px;
        margin: 0;
      }

      .feed-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: clamp(8px, 2vw, 12px) clamp(10px, 3vw, 16px);
        background: linear-gradient(90deg, #1a1f3a, #0a0d1f);
        border-bottom: 1px solid rgba(230, 212, 160, 0.3);
      }

      .feed-title {
        font-size: clamp(11px, 2.5vw, 13px);
        font-weight: 700;
        letter-spacing: 1.5px;
        color: #e6d4a0;
        text-transform: uppercase;
      }

      .live-indicator {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: clamp(9px, 2vw, 10px);
        font-weight: 700;
        letter-spacing: 1px;
        color: #fff;
      }

      .live-dot {
        width: 8px;
        height: 8px;
        background: #ff3b3b;
        border-radius: 50%;
        box-shadow: 0 0 8px #ff3b3b;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(1.3);
        }
      }

      .feed-list {
        overflow: hidden;
      }

      .bet-row {
        display: grid;
        grid-template-columns: clamp(26px, 6vw, 32px) 1fr 1fr auto;
        align-items: center;
        gap: clamp(8px, 2vw, 12px);
        padding: clamp(7px, 2vw, 10px) clamp(10px, 3vw, 16px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        animation: slideIn 0.5s ease;
      }

      .bet-row:last-child {
        border-bottom: none;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-12px);
          background: rgba(230, 212, 160, 0.12);
        }
        to {
          opacity: 1;
          transform: translateY(0);
          background: transparent;
        }
      }

      .avatar {
        width: clamp(26px, 6vw, 30px);
        height: clamp(26px, 6vw, 30px);
        border-radius: 50%;
        background: linear-gradient(135deg, #e6d4a0, #8a6f3b);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(11px, 2.5vw, 13px);
        font-weight: 700;
        color: #0a0d1f;
      }

      .username {
        font-size: clamp(11px, 2.5vw, 12px);
        font-weight: 600;
        color: #fff;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .game {
        font-size: clamp(10px, 2vw, 11px);
        color: #8a8fad;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .amount {
        font-size: clamp(11px, 2.5vw, 13px);
        font-weight: 700;
        color: #4ade80;
        white-space: nowrap;
      }

      /* On very narrow screens, hide the game column so name + amount stay readable */
      @media (max-width: 380px) {
        .bet-row {
          grid-template-columns: 26px 1fr auto;
        }
        .game {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="feed">
      <div class="feed-header">
        <div class="feed-title">Live Bets</div>
        <div class="live-indicator">
          <div class="live-dot"></div>
          <span>LIVE</span>
        </div>
      </div>
      <div class="feed-list" id="feed-list"></div>
    </div>

    <script>
      const CURRENCY = "₺";
      // Fewer rows on small screens so it doesn't overflow the iframe
      const MAX_ROWS = window.innerWidth < 480 ? 8 : 12;
      const MIN_DELAY = 1500;
      const MAX_DELAY = 4000;

      const sampleUsernames = [
        "Maximus",
        "AceHigh",
        "LuckyBet",
        "BetKing",
        "SpinMaster",
        "CryptoWolf",
        "BigWin",
        "JackpotMan",
        "SlotPro",
        "CardShark",
        "TornadoBet",
        "GoldRush",
        "DragonPlay",
        "PhoenixRise",
        "StarPlayer",
        "NightOwl",
        "ThunderBet",
        "CashKing",
        "QuickSpin",
        "RoyalFlush",
        "IronBet",
        "SilverFox",
        "BlackJack",
        "RedSeven",
        "WildCard",
      ];

      const sampleGames = [
        "Sweet Bonanza",
        "Sugar Rush",
        "Gates of Olympus",
        "The Dog House",
        "Starlight Princess",
        "Shining Crown",
        "Burning Hot",
        "40 Super Hot",
        "Big Bass Bonanza",
        "Wolf Gold",
        "Book of Dead",
        "Aviator",
        "Mines",
        "Plinko",
        "Crazy Time",
        "Lightning Roulette",
      ];

      function maskUsername(name) {
        if (name.length <= 2) return name;
        return name.slice(0, 2) + "******";
      }

      function generateRandomBet() {
        const name =
          sampleUsernames[Math.floor(Math.random() * sampleUsernames.length)];
        const game =
          sampleGames[Math.floor(Math.random() * sampleGames.length)];
        const amount = (Math.random() * 990 + 10).toFixed(2);

        return {
          username: maskUsername(name),
          initial: name[0].toUpperCase(),
          game: game,
          amount: amount,
        };
      }

      function addBet(bet) {
        const list = document.getElementById("feed-list");
        const row = document.createElement("div");
        row.className = "bet-row";
        row.innerHTML = `
      <div class="avatar">${bet.initial}</div>
      <div class="username">${bet.username}</div>
      <div class="game">${bet.game}</div>
      <div class="amount">${CURRENCY}${bet.amount}</div>
    `;
        list.prepend(row);

        while (list.children.length > MAX_ROWS) {
          list.removeChild(list.lastChild);
        }
      }

      for (let i = 0; i < MAX_ROWS; i++) addBet(generateRandomBet());

      function scheduleNextBet() {
        const delay = MIN_DELAY + Math.random() * (MAX_DELAY - MIN_DELAY);
        setTimeout(() => {
          addBet(generateRandomBet());
          scheduleNextBet();
        }, delay);
      }
      scheduleNextBet();
    </script>
  </body>
</html>
