<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Wins Feed</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: transparent;
        color: #fff;
        overflow: hidden;
      }

      .feed {
        position: relative;
        background:
          radial-gradient(
            ellipse at top,
            rgba(230, 212, 160, 0.12) 0%,
            transparent 65%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(74, 222, 128, 0.05) 0%,
            transparent 50%
          ),
          #11142a;
        border: 1px solid rgba(230, 212, 160, 0.3);
        border-radius: 12px;
        overflow: hidden;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        box-shadow:
          inset 0 1px 0 rgba(230, 212, 160, 0.15),
          0 0 24px rgba(230, 212, 160, 0.06);
      }

      .feed::before,
      .feed::after {
        content: "";
        position: absolute;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(230, 212, 160, 0.18) 0%,
          transparent 70%
        );
        pointer-events: none;
        animation: sparkle 4s ease-in-out infinite;
      }
      .feed::before {
        top: -30px;
        left: -30px;
      }
      .feed::after {
        top: -30px;
        right: -30px;
        animation-delay: 2s;
      }

      @keyframes sparkle {
        0%,
        100% {
          opacity: 0.4;
          transform: scale(1);
        }
        50% {
          opacity: 0.8;
          transform: scale(1.15);
        }
      }

      .feed-header {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: clamp(6px, 1.4vw, 9px) clamp(10px, 3vw, 16px);
        background: linear-gradient(
          90deg,
          #1a1f3a 0%,
          #0a0d1f 50%,
          #1a1f3a 100%
        );
        border-bottom: 1px solid rgba(230, 212, 160, 0.3);
        position: relative;
        z-index: 2;
      }

      .feed-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: clamp(11px, 2.5vw, 13px);
        font-weight: 700;
        letter-spacing: 1.5px;
        color: #e6d4a0;
        text-transform: uppercase;
        text-shadow: 0 0 8px rgba(230, 212, 160, 0.4);
      }

      .crown-icon {
        width: 18px;
        height: 18px;
        color: #e6d4a0;
        fill: #e6d4a0;
        filter: drop-shadow(0 0 6px rgba(230, 212, 160, 0.7));
        animation: glow 2.5s ease-in-out infinite;
        flex-shrink: 0;
      }

      @keyframes glow {
        0%,
        100% {
          filter: drop-shadow(0 0 4px rgba(230, 212, 160, 0.5));
        }
        50% {
          filter: drop-shadow(0 0 10px rgba(230, 212, 160, 0.9));
        }
      }

      .live-indicator {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: clamp(9px, 2vw, 10px);
        font-weight: 700;
        letter-spacing: 1px;
        color: #fff;
      }

      .live-dot {
        width: 8px;
        height: 8px;
        background: #ff3b3b;
        border-radius: 50%;
        box-shadow: 0 0 8px #ff3b3b;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(1.3);
        }
      }

      .feed-list {
        flex: 1;
        overflow: hidden;
        min-height: 0;
        position: relative;
        z-index: 1;
      }

      .win-row {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        align-items: center;
        gap: clamp(8px, 2vw, 12px);
        padding: clamp(4px, 1.2vw, 6px) clamp(10px, 3vw, 16px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        animation: slideIn 0.5s ease;
      }

      .win-row:last-child {
        border-bottom: none;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-12px);
          background: rgba(230, 212, 160, 0.15);
        }
        to {
          opacity: 1;
          transform: translateY(0);
          background: transparent;
        }
      }

      .username {
        font-size: clamp(11px, 2.5vw, 12px);
        font-weight: 600;
        color: #fff;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .game {
        font-size: clamp(10px, 2vw, 11px);
        color: #8a8fad;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .amount {
        font-size: clamp(12px, 3.2vw, 12px);
        font-weight: 600;
        color: #4ade80;
        white-space: nowrap;
        text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
      }

      @media (max-width: 380px) {
        .win-row {
          grid-template-columns: 1fr auto;
        }
        .game {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="feed">
      <div class="feed-header">
        <div class="feed-title">
          <svg
            class="crown-icon"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M5 16L3 6l5.5 4L12 4l3.5 6L21 6l-2 10H5zm0 2h14v2H5v-2z" />
          </svg>
          Live Wins
        </div>
        <div class="live-indicator">
          <div class="live-dot"></div>
          <span>LIVE</span>
        </div>
      </div>
      <div class="feed-list" id="feed-list"></div>
    </div>

    <script>
      const CURRENCY = "₺";
      const MIN_DELAY = 1500;
      const MAX_DELAY = 4000;
      const MIN_WIN = 5000;
      const MAX_WIN = 60000;
      const INITIAL_ROWS = 38;

      let MAX_ROWS = INITIAL_ROWS;

      const sampleUsernames = [
        "Maximus",
        "AceHigh",
        "LuckyBet",
        "BetKing",
        "SpinMaster",
        "CryptoWolf",
        "BigWin",
        "JackpotMan",
        "SlotPro",
        "CardShark",
        "TornadoBet",
        "GoldRush",
        "DragonPlay",
        "PhoenixRise",
        "StarPlayer",
        "NightOwl",
        "ThunderBet",
        "CashKing",
        "QuickSpin",
        "RoyalFlush",
        "IronBet",
        "SilverFox",
        "BlackJack",
        "RedSeven",
        "WildCard",
        "TopBet",
        "FireSpin",
        "DiamondKing",
        "AcePlayer",
        "MoonShot",
      ];

      const sampleGames = [
        "Sweet Bonanza",
        "Sugar Rush",
        "Gates of Olympus",
        "The Dog House",
        "Starlight Princess",
        "Shining Crown",
        "Burning Hot",
        "40 Super Hot",
        "Big Bass Bonanza",
        "Wolf Gold",
        "Book of Dead",
        "Aviator",
        "Mines",
        "Plinko",
        "Crazy Time",
        "Lightning Roulette",
      ];

      function maskUsername(name) {
        if (name.length <= 2) return name;
        return name.slice(0, 2) + "******";
      }

      function generateRandomWin() {
        const name =
          sampleUsernames[Math.floor(Math.random() * sampleUsernames.length)];
        const game =
          sampleGames[Math.floor(Math.random() * sampleGames.length)];
        const amount = (
          Math.random() * (MAX_WIN - MIN_WIN) +
          MIN_WIN
        ).toLocaleString("en-US", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });
        return {
          username: maskUsername(name),
          game: game,
          amount: amount,
        };
      }

      function createRowElement(win, animate = true) {
        const row = document.createElement("div");
        row.className = "win-row";
        if (!animate) row.style.animation = "none";
        row.innerHTML = `
      <div class="username">${win.username}</div>
      <div class="game">${win.game}</div>
      <div class="amount">${CURRENCY}${win.amount}</div>
    `;
        return row;
      }

      function initialFill() {
        const list = document.getElementById("feed-list");
        list.innerHTML = "";

        // Preload 30 random wins
        for (let i = 0; i < INITIAL_ROWS; i++) {
          list.appendChild(createRowElement(generateRandomWin(), false));
        }

        // If the screen is even taller and there's still empty space, keep adding
        let safety = 60;
        while (list.scrollHeight < list.clientHeight - 4 && safety-- > 0) {
          list.appendChild(createRowElement(generateRandomWin(), false));
        }

        MAX_ROWS = list.children.length;
      }

      function addWin(win) {
        const list = document.getElementById("feed-list");
        list.prepend(createRowElement(win, true));
        while (list.children.length > MAX_ROWS) {
          list.removeChild(list.lastChild);
        }
      }

      function scheduleNextWin() {
        const delay = MIN_DELAY + Math.random() * (MAX_DELAY - MIN_DELAY);
        setTimeout(() => {
          addWin(generateRandomWin());
          scheduleNextWin();
        }, delay);
      }

      window.addEventListener("load", () => {
        initialFill();
        scheduleNextWin();
      });

      let resizeTimeout;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(initialFill, 200);
      });
    </script>
  </body>
</html>
