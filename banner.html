<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bets Feed</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: transparent;
            color: #fff;
            overflow: hidden;
        }

        .feed {
            background: #11142a;
            border: 1px solid rgba(230, 212, 160, 0.2);
            border-radius: 12px;
            overflow: hidden;
            max-width: 500px;
            margin: 0 auto;
        }

        .feed-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: linear-gradient(90deg, #1a1f3a, #0a0d1f);
            border-bottom: 1px solid rgba(230, 212, 160, 0.3);
        }

        .feed-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #e6d4a0;
            text-transform: uppercase;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #fff;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #ff3b3b;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff3b3b;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.3);
            }
        }

        .feed-list {
            max-height: 340px;
            overflow: hidden;
        }

        .bet-row {
            display: grid;
            grid-template-columns: 32px 1fr 1fr auto;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            animation: slideIn 0.5s ease;
        }

        .bet-row:last-child {
            border-bottom: none;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-12px);
                background: rgba(230, 212, 160, 0.12);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                background: transparent;
            }
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e6d4a0, #8a6f3b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #0a0d1f;
        }

        .username {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .game {
            font-size: 11px;
            color: #8a8fad;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .amount {
            font-size: 13px;
            font-weight: 700;
            color: #4ade80;
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <div class="feed">
        <div class="feed-header">
            <div class="feed-title">Live Bets</div>
            <div class="live-indicator">
                <div class="live-dot"></div>
                <span>LIVE</span>
            </div>
        </div>
        <div class="feed-list" id="feed-list"></div>
    </div>

    <script>
        // ============================================================
        // CONFIG
        // ============================================================
        const CURRENCY = '₺';     // change to '$', '€', etc.
        const MAX_ROWS = 8;        // visible rows in the feed
        const MIN_DELAY = 1500;     // min ms between new bets
        const MAX_DELAY = 4000;     // max ms between new bets

        // ============================================================
        // SAMPLE DATA — replace with real API data later
        // ============================================================
        const sampleUsernames = [
            'Maximus', 'AceHigh', 'LuckyBet', 'BetKing', 'SpinMaster',
            'CryptoWolf', 'BigWin', 'JackpotMan', 'SlotPro', 'CardShark',
            'TornadoBet', 'GoldRush', 'DragonPlay', 'PhoenixRise', 'StarPlayer',
            'NightOwl', 'ThunderBet', 'CashKing', 'QuickSpin', 'RoyalFlush',
            'IronBet', 'SilverFox', 'BlackJack', 'RedSeven', 'WildCard'
        ];

        const sampleGames = [
            'Sweet Bonanza', 'Sugar Rush', 'Gates of Olympus', 'The Dog House',
            'Starlight Princess', 'Shining Crown', 'Burning Hot', '40 Super Hot',
            'Big Bass Bonanza', 'Wolf Gold', 'Book of Dead', 'Aviator',
            'Mines', 'Plinko', 'Crazy Time', 'Lightning Roulette'
        ];

        // ============================================================
        // MASK USERNAME — first 2 chars then ******
        // ============================================================
        function maskUsername(name) {
            if (name.length <= 2) return name;
            return name.slice(0, 2) + '******';
        }

        // ============================================================
        // GENERATE RANDOM BET — replace this with your API fetch
        // ============================================================
        function generateRandomBet() {
            const name = sampleUsernames[Math.floor(Math.random() * sampleUsernames.length)];
            const game = sampleGames[Math.floor(Math.random() * sampleGames.length)];
            const amount = (Math.random() * 990 + 10).toFixed(2);

            return {
                username: maskUsername(name),
                initial: name[0].toUpperCase(),
                game: game,
                amount: amount
            };
        }

        // ============================================================
        // RENDER ONE BET ROW
        // ============================================================
        function addBet(bet) {
            const list = document.getElementById('feed-list');
            const row = document.createElement('div');
            row.className = 'bet-row';
            row.innerHTML = `
      <div class="avatar">${bet.initial}</div>
      <div class="username">${bet.username}</div>
      <div class="game">${bet.game}</div>
      <div class="amount">${CURRENCY}${bet.amount}</div>
    `;
            list.prepend(row);

            while (list.children.length > MAX_ROWS) {
                list.removeChild(list.lastChild);
            }
        }

        // ============================================================
        // INIT — fill, then keep scheduling new ones
        // ============================================================
        for (let i = 0; i < MAX_ROWS; i++) addBet(generateRandomBet());

        function scheduleNextBet() {
            const delay = MIN_DELAY + Math.random() * (MAX_DELAY - MIN_DELAY);
            setTimeout(() => {
                addBet(generateRandomBet());
                scheduleNextBet();
            }, delay);
        }
        scheduleNextBet();

        /* ============================================================
           WHEN CONNECTING TO REAL DATA, REPLACE generateRandomBet WITH:
      
           async function fetchLatestBet() {
             const res  = await fetch('https://your-api.com/bets/latest');
             const data = await res.json();
             return {
               username: maskUsername(data.username),
               initial:  data.username[0].toUpperCase(),
               game:     data.gameName,
               amount:   parseFloat(data.amount).toFixed(2)
             };
           }
      
           Then make scheduleNextBet async and replace
             addBet(generateRandomBet());
           with
             addBet(await fetchLatestBet());
        ============================================================ */
    </script>

</body>

</html>
