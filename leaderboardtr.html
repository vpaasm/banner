<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liderlik Tablosu</title>
    <link rel="stylesheet" href="leaderboard.css" />
  </head>
  <body>
    <div class="board">
      <div class="board-header">
        <div class="board-title">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9" />
            <path d="M12 7v5l3 2" />
          </svg>
          Liderlik Tablosu
        </div>
        <div class="daily-pill">Günlük</div>
      </div>

      <div class="prizepool">
        <div class="label">Ödül Havuzu</div>
        <div class="amount">5,000 USDT</div>
      </div>

      <div class="countdown">
        <div class="cd-box">
          <div class="cd-num" id="cd-days">0</div>
          <div class="cd-label">Gün</div>
        </div>
        <div class="cd-box">
          <div class="cd-num" id="cd-hours">00</div>
          <div class="cd-label">Saat</div>
        </div>
        <div class="cd-box">
          <div class="cd-num" id="cd-mins">00</div>
          <div class="cd-label">Dakika</div>
        </div>
        <div class="cd-box">
          <div class="cd-num" id="cd-secs">00</div>
          <div class="cd-label">Saniye</div>
        </div>
      </div>

      <div class="list" id="list"></div>

      <div class="pagination" id="pagination"></div>
    </div>

    <script>
      window.LB_LABELS = { user: "Kullanıcı", points: "Puan", prize: "Ödül" };
    </script>
    <script src="leaderboard.js"></script>
  </body>
</html>
